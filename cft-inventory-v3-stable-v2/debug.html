<!DOCTYPE html>
<html>
<head>
    <title>Debug Console</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #333; }
        .pass { background: #002200; }
        .fail { background: #220000; color: #f00; }
    </style>
</head>
<body>
    <h1>CFT Inventory Debug Console</h1>
    <div id="tests"></div>
    
    <script>
        const results = document.getElementById('tests');
        
        function test(name, fn) {
            try {
                const result = fn();
                results.innerHTML += `<div class="test pass">✓ ${name}: ${result}</div>`;
            } catch(e) {
                results.innerHTML += `<div class="test fail">✗ ${name}: ${e.message}</div>`;
            }
        }
        
        // Test API
        test('API Endpoint', async () => {
            const response = await fetch('/.netlify/functions/get-inventory');
            const data = await response.text();
            return `${data.split('\n').length - 1} rows`;
        });
        
        // Test Apps Script
        test('Apps Script', async () => {
            const response = await fetch('https://script.google.com/macros/s/AKfycbxGpuUe8AkkQCrO9zB4uolgX2smc_Ih66k8VXrlWdB3794D5YuYckhaAoTq6TcozOHT/exec?action=getInventory');
            const data = await response.json();
            return `${data.length - 1} items`;
        });
        
        // Check if main elements exist
        test('DOM Elements', () => {
            const elements = ['pageTitle', 'totalItems', 'availableItems', 'inUseItems', 'totalValue'];
            const missing = elements.filter(id => !document.getElementById(id));
            if (missing.length > 0) throw new Error(`Missing: ${missing.join(', ')}`);
            return 'All present';
        });
    </script>
</body>
</html>
