<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments | Craftech360 Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{'body':['IBM Plex Sans','sans-serif'],'heading':['Sora','sans-serif']}}}}</script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body bg-slate-50 text-slate-900 min-h-screen">
    <div id="auth-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl flex items-center justify-center mx-auto mb-4"><span class="text-white text-2xl font-bold">C</span></div>
                <h1 class="font-heading text-2xl font-semibold">Mission Control</h1>
            </div>
            <form id="auth-form" class="space-y-4">
                <input type="password" id="auth-code" class="w-full px-4 py-3 border border-slate-300 rounded-lg" placeholder="Enter access code">
                <button type="submit" class="w-full py-3 bg-slate-900 text-white rounded-lg font-medium">Sign In</button>
                <p id="auth-error" class="text-red-500 text-sm text-center hidden">Invalid access code</p>
            </form>
        </div>
    </div>
    <div id="app" class="hidden flex h-screen">
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
            <div class="p-4 border-b border-slate-200">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-slate-800 to-slate-900 rounded-lg flex items-center justify-center"><span class="text-white font-bold">C</span></div>
                    <div><div class="font-heading font-semibold text-slate-900">Craftech360</div><div class="text-[10px] uppercase tracking-wider text-slate-500">Mission Control</div></div>
                </div>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-4 overflow-y-auto">
                <a href="index.html" class="nav-item"><i data-lucide="bar-chart-3" class="w-4 h-4"></i>Dashboard</a>
                <a href="activity.html" class="nav-item"><i data-lucide="activity" class="w-4 h-4"></i>Activity</a>
                <a href="tasks.html" class="nav-item"><i data-lucide="layout-grid" class="w-4 h-4"></i>Tasks</a>
                <a href="departments.html" class="nav-item"><i data-lucide="folder" class="w-4 h-4"></i>Departments</a>
                <a href="products.html" class="nav-item"><i data-lucide="box" class="w-4 h-4"></i>Products</a>
                <a href="organization.html" class="nav-item"><i data-lucide="building-2" class="w-4 h-4"></i>Organization</a>
                <a href="agents.html" class="nav-item"><i data-lucide="bot" class="w-4 h-4"></i>Agents</a>
                <a href="integrations.html" class="nav-item"><i data-lucide="network" class="w-4 h-4"></i>Integrations</a>
            </nav>
        </aside>
        <main class="flex-1 overflow-y-auto p-8">
            <h1 class="font-heading text-2xl font-semibold mb-4">Departments</h1>
            <p class="text-slate-500">This page is under construction. Check back soon!</p>
            <a href="index.html" class="inline-block mt-4 px-4 py-2 bg-slate-900 text-white rounded-lg">Back to Dashboard</a>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
